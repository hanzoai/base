name: gitleaks

# Secret-scan gate. Fails the check if a push or PR introduces a private
# key or an hz_data/* secret (see .gitleaks.toml). Scans only the NEW
# commits of the event so pre-existing upstream test vectors never gate a
# change; run with workflow_dispatch(full_history=true) for a full audit.

on:
  push:
    branches: ["**"]
    tags: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      full_history:
        description: "Scan the entire history instead of just new commits"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so commit ranges resolve

      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Resolve scan range
        id: range
        env:
          EVENT: ${{ github.event_name }}
          FULL: ${{ github.event.inputs.full_history }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ZERO=0000000000000000000000000000000000000000
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FULL" = "true" ]; then
            echo "logopts=--all" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ]; then
            echo "logopts=--no-merges $PR_BASE..$PR_HEAD" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "push" ] && [ -n "${PUSH_BEFORE:-}" ] && [ "$PUSH_BEFORE" != "$ZERO" ]; then
            echo "logopts=--no-merges $PUSH_BEFORE..$SHA" >> "$GITHUB_OUTPUT"
          else
            # new branch/tag or first push: scan just the tip commit
            echo "logopts=--no-merges -n 1 $SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan
        run: |
          set -euo pipefail
          echo "Scanning commits: ${{ steps.range.outputs.logopts }}"
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${{ steps.range.outputs.logopts }}" \
            --redact \
            --no-banner \
            --exit-code 1
