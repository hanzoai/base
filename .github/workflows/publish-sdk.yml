name: Publish SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: [base-js, base-react]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: sdk/${{ matrix.package }}
        run: npm install

      - name: Build
        working-directory: sdk/${{ matrix.package }}
        run: npx tsup

      - name: Publish
        working-directory: sdk/${{ matrix.package }}
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
