name: Docker

on:
  push:
    branches: [main, test, dev]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/hanzoai/base

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: [self-hosted, linux, amd64]
    env:
      GOPRIVATE: github.com/hanzoai/*,github.com/luxfi/*,github.com/zap-proto/*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      # luxfi/zap (forward bridge) is a private cross-org module; the runner-side
      # go build/test needs authenticated git to fetch it. GH_PAT is the org
      # cross-org token (reads hanzoai/* + luxfi/*).
      - name: Configure private cross-org module auth
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
      - run: go build ./...
      - run: go test ./core/... ./plugins/platform/... ./tools/...

  docker:
    needs: test
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/base
      platforms: "linux/amd64"
    secrets: inherit
