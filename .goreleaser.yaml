version: 2

project_name: base

dist: .builds

before:
  hooks:
    # NOT `go mod tidy` — release must build from the committed, already-tidy
    # go.mod/go.sum, never re-resolve the graph (that both mutates deps at
    # release time and trips the authenticated-git-only private module set).
    # `download` populates the cache, verifying against the existing go.sum.
    - go mod download

builds:
  - id: build_noncgo
    main: ./examples/base
    binary: base
    ldflags:
      - -s -w -X github.com/hanzoai/base.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    # Ship only the platforms Base actually runs on: linux servers (DOKS) and
    # darwin dev machines, amd64 + arm64. The old s390x/ppc64le/32-bit-arm
    # targets never shipped and don't build — s390x/ppc64le trip a
    # cronokirby/saferith package-name quirk pulled via luxfi/threshold, and
    # windows can't compile cmd/cli/daemon.go (unconditional syscall.Setpgid).
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

release:
  draft: true

archives:
  - id: archive_noncgo
    builds: [build_noncgo]
    format: zip
    files:
      - LICENSE.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^examples:'
      - '^ui:'
