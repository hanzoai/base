version: 2

project_name: base

dist: .builds

before:
  hooks:
    # NOT `go mod tidy` — release must build from the committed, already-tidy
    # go.mod/go.sum, never re-resolve the graph (that both mutates deps at
    # release time and trips the authenticated-git-only private module set).
    # `download` populates the cache, verifying against the existing go.sum.
    - go mod download

builds:
  - id: build_noncgo
    main: ./examples/base
    binary: base
    ldflags:
      - -s -w -X github.com/hanzoai/base.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - s390x
      - ppc64le
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: ppc64le
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le

release:
  draft: true

archives:
  - id: archive_noncgo
    builds: [build_noncgo]
    format: zip
    files:
      - LICENSE.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^examples:'
      - '^ui:'
