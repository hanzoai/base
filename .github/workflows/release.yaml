name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: hanzo-build-linux-amd64
    env:
      flags: ""
      # luxfi/hanzoai are private cross-org modules — resolve them via
      # authenticated git (below), NOT the public proxy, so go.sum verifies
      # (the proxy holds re-pushed bits for some luxfi tags; git matches go.sum).
      GOPRIVATE: github.com/hanzoai/*,github.com/luxfi/*
      GONOSUMDB: github.com/hanzoai/*,github.com/luxfi/*
    steps:
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "flags=--snapshot" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No node/pnpm setup: this job never runs `pnpm install` — ui-react/dist
      # is committed and embedded via //go:embed all:dist (see the SPA note
      # below). setup-node with `cache: pnpm` only added a post-step that failed
      # trying to save a non-existent pnpm store, reddening an otherwise-green
      # release. Refresh ui-react/dist locally before tagging if the SPA changed.
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.1'

      # Authenticated git for the private module set — every go operation in
      # this job (test, the goreleaser go-mod-download hook, and the builds)
      # then fetches hanzoai/* + luxfi/* from git, matching go.sum.
      - name: Configure private cross-org module auth
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      # ui-react/dist/ is committed and embedded by //go:embed all:dist
      # in ui-react/embed.go. Skip the SPA rebuild here — the binary picks
      # up whatever was committed. Refresh ui-react/dist locally with
      # `pnpm --dir ui-react build` before tagging if the SPA changed.

      - name: Test
        run: go test ./...

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean ${{ env.flags }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
